  <script>
    const { exec } = require('child_process');
    const BATCH_SIZE = 8;
    
    let operators = [];
    let ips = {};
    let editingId = null;
    let editingOperatorId = null;
    let activeCheck = false;
    let continuousTimers = new Map();
    let continuousLogs = new Map(); // Хранит логи непрерывной проверки для каждого IP
    let logBuffer = [];
    let statusFilter = null;
    let checkMethod = 'batch'; // 'batch' или 'sequential'

    function pingHost(host, timeoutMs = 5000) {
      return new Promise((resolve) => {
        const isWin = process.platform === 'win32';
        const timeout = Math.max(500, timeoutMs);
        
        const cmd = isWin 
          ? `ping -n 1 -w ${timeout} ${host}` 
          : `ping -c 1 -W ${Math.ceil(timeout/1000)} ${host}`;
        
        const start = Date.now();
        
        exec(cmd, { timeout: timeout + 1000 }, (error, stdout, stderr) => {
          const time = Date.now() - start;
          const output = (stdout || '') + (stderr || '');
          const outputLower = output.toLowerCase();
          
          let isSuccess = false;
          
          if (!error) {
            if (outputLower.includes('ttl=')) isSuccess = true;
            else if (outputLower.includes('time=')) isSuccess = true;
            else if (outputLower.includes('time<')) isSuccess = true;
            else if (outputLower.includes('время=')) isSuccess = true;
            else if (outputLower.includes('ответ от')) isSuccess = true;
          }
          
          resolve({ 
            ok: isSuccess, 
            time: isSuccess ? time : 0
          });
        });
      });
    }

    function saveData() {
      localStorage.setItem('ip_manager_ops', JSON.stringify(operators));
      const toSave = {};
      for (const [id, ip] of Object.entries(ips)) {
        const { checking, continuousTimerId, ...rest } = ip;
        toSave[id] = rest;
      }
      localStorage.setItem('ip_manager_ips', JSON.stringify(toSave));
      localStorage.setItem('ip_manager_check_method', checkMethod);
    }

    function loadData() {
      const savedOps = localStorage.getItem('ip_manager_ops');
      if (savedOps) operators = JSON.parse(savedOps);
      const savedIps = localStorage.getItem('ip_manager_ips');
      if (savedIps) {
        const parsed = JSON.parse(savedIps);
        ips = {};
        for (const [id, ip] of Object.entries(parsed)) {
          ips[id] = { ...ip, id, checking: false, selected: false, continuousPing: false, continuousTimerId: null };
        }
      }
      const savedMethod = localStorage.getItem('ip_manager_check_method');
      if (savedMethod) checkMethod = savedMethod;
      updateCheckMethodUI();
    }

    function log(msg) {
      const time = new Date().toLocaleTimeString();
      logBuffer.push(`[${time}] ${msg}`);
      if (logBuffer.length > 300) logBuffer.shift();
      const logEl = document.getElementById('workLog');
      if (logEl) logEl.textContent = logBuffer.join('\n');
      logEl.scrollTop = logEl.scrollHeight;
    }

    function updateCheckMethodUI() {
      const methodBatch = document.getElementById('methodBatch');
      const methodSequential = document.getElementById('methodSequential');
      
      if (checkMethod === 'batch') {
        methodBatch.classList.add('check-method-active');
        methodSequential.classList.remove('check-method-active');
      } else {
        methodSequential.classList.add('check-method-active');
        methodBatch.classList.remove('check-method-active');
      }
    }

    // Функция сохранения отчета по непрерывной проверке
    function saveContinuousReport(ip) {
      const logs = continuousLogs.get(ip.id) || [];
      if (logs.length === 0) {
        alert(`Нет данных для IP ${ip.ip}`);
        return;
      }
      
      const now = new Date();
      const dateStr = now.toLocaleString('ru-RU');
      const dateFileStr = now.toISOString().slice(0, 19).replace(/:/g, '-');
      
      // Подсчет статистики
      const totalChecks = logs.length;
      const successChecks = logs.filter(l => l.ok).length;
      const avgDelay = successChecks > 0 ? Math.round(logs.filter(l => l.ok).reduce((sum, l) => sum + l.time, 0) / successChecks) : 0;
      const minDelay = successChecks > 0 ? Math.min(...logs.filter(l => l.ok).map(l => l.time)) : 0;
      const maxDelay = successChecks > 0 ? Math.max(...logs.filter(l => l.ok).map(l => l.time)) : 0;
      
      let report = `ОТЧЕТ НЕПРЕРЫВНОЙ ПРОВЕРКИ IP АДРЕСА
${'='.repeat(60)}

IP адрес: ${ip.ip}

${'='.repeat(60)}
СТАТИСТИКА:
${'-'.repeat(40)}

Максимальная задержка: ${maxDelay} ms

${'='.repeat(60)}

    async function continuousCheck(ip) {
      if (!ip.continuousPing) return;
      const res = await pingHost(ip.ip, ip.timeout || 5000);
      
      // Сохраняем лог
      if (!continuousLogs.has(ip.id)) {
        continuousLogs.set(ip.id, []);
      }
      const logs = continuousLogs.get(ip.id);
      logs.push({
        timestamp: new Date().toISOString(),
        ok: res.ok,
        time: res.time
      });
      
      // Ограничиваем размер лога (последние 10000 записей)
      if (logs.length > 10000) {
        logs.shift();
      }
      
      ip.lastCheck = {
        ok: res.ok,
        stats: res.ok ? '1/1' : '0/1',
        avg: res.time,
        lastCheckTime: new Date().toISOString()
      };
      saveData();
      renderIps();
      updateStats();
      
      const statusIcon = res.ok ? '✅' : '❌';
      const statusText = res.ok ? 'Доступен' : 'Недоступен';
      log(`${statusIcon} [непрерывный] ${ip.ip}: ${statusText} (${res.time}ms)`);
    }

    function startContinuous(ip) {
      if (ip.continuousPing) return;
      ip.continuousPing = true;
      
      // Инициализируем лог для этого IP
      if (!continuousLogs.has(ip.id)) {
        continuousLogs.set(ip.id, []);
      }
      
      const interval = setInterval(() => continuousCheck(ip), 2000);
      ip.continuousTimerId = interval;
      continuousTimers.set(ip.id, interval);
      log(`🔄 Запущен непрерывный опрос ${ip.ip} (интервал 2с)`);
      renderIps();
      continuousCheck(ip);
    }

    function stopContinuous(ip) {
      if (!ip.continuousPing) return;
      
      // Сохраняем отчет перед остановкой
      if (confirm(`Остановить непрерывную проверку для ${ip.ip}?\n\nХотите сохранить отчет о проверке?`)) {
        saveContinuousReport(ip);
      }
      
      if (ip.continuousTimerId) {
        clearInterval(ip.continuousTimerId);
        continuousTimers.delete(ip.id);
      }
      ip.continuousPing = false;
      ip.continuousTimerId = null;
      log(`⏹️ Остановлен непрерывный опрос ${ip.ip}`);
      renderIps();
    }

    function updateStats() {
      const list = Object.values(ips);
      const total = list.length;
      const available = list.filter(ip => ip.lastCheck && ip.lastCheck.ok).length;
      const unavailable = list.filter(ip => ip.lastCheck && !ip.lastCheck.ok).length;
      
      const availableClass = statusFilter === 'available' ? 'status-filter-active' : '';
      const unavailableClass = statusFilter === 'unavailable' ? 'status-filter-active' : '';
      
      document.getElementById('statsGrid').innerHTML = `
        <div class="stat-card ${availableClass}" data-filter="available">
          <div class="stat-value" style="color:#4caf50">${available}</div>
          <div class="stat-label">Доступно</div>
        </div>
        <div class="stat-card ${unavailableClass}" data-filter="unavailable">
          <div class="stat-value" style="color:#e53935">${unavailable}</div>
          <div class="stat-label">Недоступно</div>
        </div>
        <div class="stat-card" data-filter="all">
          <div class="stat-value">${total}</div>
          <div class="stat-label">Всего IP</div>
        </div>
      `;
      
      document.querySelectorAll('.stat-card').forEach(card => {
        card.addEventListener('click', () => {
          const filter = card.dataset.filter;
          if (filter === 'available') {
            statusFilter = statusFilter === 'available' ? null : 'available';
          } else if (filter === 'unavailable') {
            statusFilter = statusFilter === 'unavailable' ? null : 'unavailable';
          } else {
            statusFilter = null;
          }
          renderIps();
          updateStats();
        });
      });
    }

    async function checkSingleIp(ip, attempts, timeout, logDetails = false) {
      let okCount = 0;
      let totalTime = 0;
      for (let i = 0; i < attempts; i++) {
        if (!activeCheck) break;
        const res = await pingHost(ip.ip, timeout);
        if (logDetails) {
          log(`🔍 ${ip.ip}: попытка ${i+1}/${attempts} - ${res.ok ? '✅ Успешно' : '❌ Ошибка'} (${res.time}ms)`);
        }
        if (res.ok) {
          okCount++;
          totalTime += res.time;
        }
      }
      const avg = okCount ? Math.round(totalTime / okCount) : 0;
      return { ok: okCount > 0, stats: `${okCount}/${attempts}`, avg };
    }

    async function startBatchCheck() {
      const toCheck = Object.values(ips).filter(ip => ip.selected);
      if (toCheck.length === 0) {
        alert('Выберите IP для проверки');
        return;
      }
      
      activeCheck = true;
      const checkBtn = document.getElementById('checkSelectedBtn');
      const stopBtn = document.getElementById('stopCheckBtn');
      const progressContainer = document.getElementById('progressContainer');
      const progressFill = document.querySelector('#progressContainer .progress-fill');
      const progressText = document.getElementById('progressText');
      
      checkBtn.disabled = true;
      stopBtn.style.display = 'inline-block';
      progressContainer.classList.remove('hidden');
      
      let completed = 0;
      const total = toCheck.length;
      
      log(`🚀 Запуск проверки ${total} адресов (метод: ${checkMethod === 'batch' ? 'пакетный' : 'последовательный'})`);
      
      if (checkMethod === 'batch') {
        const batches = [];
        for (let i = 0; i < toCheck.length; i += BATCH_SIZE) {
          batches.push(toCheck.slice(i, i + BATCH_SIZE));
        }
        
        for (let batchIdx = 0; batchIdx < batches.length; batchIdx++) {
          if (!activeCheck) break;
          
          const batch = batches[batchIdx];
          log(`📦 Пакет ${batchIdx + 1}/${batches.length} (${batch.length} адресов)...`);
          
          const promises = batch.map(ip => {
            const attempts = ip.attempts || 4;
            const timeout = ip.timeout || 5000;
            return checkSingleIp(ip, attempts, timeout, false).then(result => ({ ip, result }));
          });
          
          const results = await Promise.all(promises);
          
          for (const { ip, result } of results) {
            if (!activeCheck) break;
            ip.lastCheck = {
              ok: result.ok,
              stats: result.stats,
              avg: result.avg,
              lastCheckTime: new Date().toISOString()
            };
            log(`${result.ok ? '✅' : '❌'} ${ip.ip}: ${result.stats}, ${result.avg}ms`);
            completed++;
            const percent = (completed / total) * 100;
            progressFill.style.width = `${percent}%`;
            progressText.textContent = `${completed}/${total}`;
            saveData();
            renderIps();
            updateStats();
          }
          
          if (activeCheck && batchIdx < batches.length - 1) {
            await new Promise(r => setTimeout(r, 500));
          }
        }
      } else {
        for (let idx = 0; idx < toCheck.length; idx++) {
          if (!activeCheck) break;
          
          const ip = toCheck[idx];
          log(`⏯️ Проверка ${idx + 1}/${total}: ${ip.ip}`);
          
          const attempts = ip.attempts || 4;
          const timeout = ip.timeout || 5000;
          const result = await checkSingleIp(ip, attempts, timeout, true);
          
          ip.lastCheck = {
            ok: result.ok,
            stats: result.stats,
            avg: result.avg,
            lastCheckTime: new Date().toISOString()
          };
          
          log(`${result.ok ? '✅' : '❌'} ${ip.ip}: ${result.stats}, ${result.avg}ms`);
          completed++;
          const percent = (completed / total) * 100;
          progressFill.style.width = `${percent}%`;
          progressText.textContent = `${completed}/${total}`;
          saveData();
          renderIps();
          updateStats();
          
          if (activeCheck && idx < toCheck.length - 1) {
            await new Promise(r => setTimeout(r, 1000));
          }
        }
      }
      
      checkBtn.disabled = false;
      stopBtn.style.display = 'none';
      progressContainer.classList.add('hidden');
      activeCheck = false;
      log(`✅ Проверка завершена. Обработано ${completed}/${total} адресов`);
    }

  <h2>📋 Детальная информация по IP адресам</h2>

    <tbody>`;
        
        for (const ip of selectedIps.sort((a, b) => a.ip.localeCompare(b.ip))) {
          const op = operators.find(o => o.id === ip.operatorId);

            : 'status-none';

        htmlReport += `
    </tbody>

  </div>
</div>
</body>
</html>`;
        
        report = htmlReport;
        filename = `ip_report_${dateFileStr}.html`;
        mimeType = 'text/html;charset=utf-8';
        log(`📄 Сформирован HTML отчет по выбранным IP (${total} адресов, доступно: ${available}, недоступно: ${unavailable})`);
        
      } else if (format === 'txt') {
        let txtReport = `ОТЧЕТ О ПРОВЕРКЕ IP АДРЕСОВ
Дата формирования: ${dateStr}
Способ проверки: ${checkMethod === 'batch' ? 'Пакетный (по 8 адресов)' : 'Последовательный (по одному)'}
Выбрано IP адресов для отчета: ${total}
${'='.repeat(60)}

ОБЩАЯ СТАТИСТИКА:
${'-'.repeat(40)}
Всего выбрано IP: ${total}
Проверено: ${checked}
Доступно: ${available}
Недоступно: ${unavailable}

${'='.repeat(60)}
ДЕТАЛЬНАЯ ИНФОРМАЦИЯ:
${'-'.repeat(60)}

`;
        
        for (const ip of selectedIps.sort((a, b) => a.ip.localeCompare(b.ip))) {
          const op = operators.find(o => o.id === ip.operatorId);
          const status = ip.lastCheck 
            ? (ip.lastCheck.ok ? 'ДОСТУПЕН' : 'НЕДОСТУПЕН')
            : 'НЕ ПРОВЕРЕНО';
          const result = ip.lastCheck ? ip.lastCheck.stats : '-';
          const avgTime = ip.lastCheck ? `${ip.lastCheck.avg} ms` : '-';
          const lastTime = ip.lastCheck ? new Date(ip.lastCheck.lastCheckTime).toLocaleString('ru-RU') : '-';
          
          txtReport += `
IP: ${ip.ip}
   Устройство: ${ip.deviceName || '-'}
   Номер: ${ip.deviceNumber || '-'}

   Таймаут: ${ip.timeout || 5000} ms | Попытки: ${ip.attempts || 4}

   Результат: ${result}
   Среднее время: ${avgTime}
   Последняя проверка: ${lastTime}
${'-'.repeat(40)}`;
        }
        
        txtReport += `
${'='.repeat(60)}
Отчет сгенерирован автоматически программой "IP менеджер с проверкой соединений"`;
        
        report = txtReport;
        filename = `ip_report_${dateFileStr}.txt`;
        mimeType = 'text/plain;charset=utf-8';
        log(`📄 Сформирован TXT отчет по выбранным IP (${total} адресов, доступно: ${available}, недоступно: ${unavailable})`);
        
      } else if (format === 'csv') {
        let csvReport = 'IP,Устройство,Номер,Описание,Оператор,Таймаут,Попытки,Статус,Результат,Время ответа,Последняя проверка\n';
        
        for (const ip of selectedIps.sort((a, b) => a.ip.localeCompare(b.ip))) {
          const op = operators.find(o => o.id === ip.operatorId);
          const status = ip.lastCheck 
            ? (ip.lastCheck.ok ? 'Доступен' : 'Недоступен')
            : 'Не проверено';
          const result = ip.lastCheck ? ip.lastCheck.stats : '-';
          const avgTime = ip.lastCheck ? ip.lastCheck.avg : 0;
          const lastTime = ip.lastCheck ? new Date(ip.lastCheck.lastCheckTime).toLocaleString('ru-RU') : '-';
          
          csvReport += `"${ip.ip}","${ip.deviceName || ''}","${ip.deviceNumber || ''}","${ip.description || ''}","${op ? op.name : ''}",${ip.timeout || 5000},${ip.attempts || 4},"${status}","${result}",${avgTime},"${lastTime}"\n`;
        }
        
        report = '\uFEFF' + csvReport;
        filename = `ip_report_${dateFileStr}.csv`;
        mimeType = 'text/csv;charset=utf-8';
        log(`📊 Сформирован CSV отчет по выбранным IP (${total} адресов, доступно: ${available}, недоступно: ${unavailable})`);

      const blob = new Blob([report], { type: mimeType });
      const url = URL.createObjectURL(blob);
      const a = document.getElementById('downloadLink');
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);

    function createBackup() {
      const backup = { date: new Date().toISOString(), operators, ips: {} };
      for (const [id, ip] of Object.entries(ips)) {
        const { checking, continuousTimerId, ...keep } = ip;
        backup.ips[id] = keep;
      }
      const backups = JSON.parse(localStorage.getItem('ip_manager_backups') || '{}');
      backups[`backup_${Date.now()}`] = backup;
      localStorage.setItem('ip_manager_backups', JSON.stringify(backups));
      
      const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.getElementById('downloadLink');
      a.href = url;
      a.download = `ip_backup_${new Date().toISOString().slice(0,19)}.json`;
      a.click();
      URL.revokeObjectURL(url);
      log('Бэкап создан');
    }

    function showBackups() {
      const backups = JSON.parse(localStorage.getItem('ip_manager_backups') || '{}');
      const keys = Object.keys(backups).sort().reverse();
      if (keys.length === 0) { alert('Нет сохраненных бэкапов'); return; }
      const list = keys.map((k, i) => `${i+1}. ${k} (${new Date(backups[k].date).toLocaleString()})`).join('\n');
      const idx = prompt('Доступные бэкапы:\n' + list + '\n\nВведите номер:', '1');
      if (idx) {
        const key = keys[parseInt(idx)-1];
        if (key && backups[key] && confirm('Восстановление удалит текущие данные?')) {
          for (const timer of continuousTimers.values()) clearInterval(timer);
          const backup = backups[key];
          operators = backup.operators || [];
          ips = {};
          for (const [id, ip] of Object.entries(backup.ips || {})) {
            ips[id] = { ...ip, id, checking: false, selected: false, continuousPing: false, continuousTimerId: null };
          }
          saveData(); renderOperators(); renderIps(); updateStats();
          log(`Восстановлен бэкап от ${new Date(backup.date).toLocaleString()}`);
        }
      }
    }

    function exportCsv() {
      let csv = 'IP,Устройство,Номер,Описание,Оператор,Таймаут,Попытки,Статус,Результат,Время\n';
      for (const ip of Object.values(ips)) {
        const op = operators.find(o => o.id === ip.operatorId);
        csv += `"${ip.ip}","${ip.deviceName || ''}","${ip.deviceNumber || ''}","${ip.description || ''}","${op ? op.name : ''}",${ip.timeout||5000},${ip.attempts||4},"${ip.lastCheck?.ok ? 'OK' : 'FAIL'}","${ip.lastCheck?.stats || ''}",${ip.lastCheck?.avg || 0}\n`;
      }
      const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.getElementById('downloadLink');
      a.href = url;
      a.download = `ips_${new Date().toISOString().slice(0,10)}.csv`;
      a.click();
      URL.revokeObjectURL(url);
      log('Экспорт CSV выполнен');
    }

    function importCsv(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        const lines = e.target.result.split(/\r?\n/);
        let added = 0;
        for (let i = 1; i < lines.length; i++) {
          const line = lines[i].trim();
          if (!line) continue;
          const parts = line.split(',').map(p => p.replace(/^"|"$/g, ''));
          if (parts.length < 1) continue;
          const ipAddr = parts[0];
          if (!ipAddr) continue;
          
          let opId = '';
          if (parts[4]) {
            let op = operators.find(o => o.name === parts[4]);
            if (!op) { op = { id: Date.now() + Math.random(), name: parts[4] }; operators.push(op); }
            opId = op.id;
          }
          
          const existing = Object.values(ips).find(ip => ip.ip === ipAddr);
          const newIp = {
            ip: ipAddr, deviceName: parts[1] || '', deviceNumber: parts[2] || '',
            description: parts[3] || '', operatorId: opId,
            timeout: parseInt(parts[5]) || 5000, attempts: parseInt(parts[6]) || 4,
            selected: false, lastCheck: null, continuousPing: false, continuousTimerId: null
          };
          
          if (existing) Object.assign(existing, newIp);
          else { const id = Date.now() + Math.random(); ips[id] = { ...newIp, id }; }
          added++;
        }
        saveData(); renderOperators(); renderIps(); updateStats();
        log(`Импортировано ${added} записей`);
      };
      reader.readAsText(file, 'UTF-8');
    }

    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }

    loadData();
    renderOperators();
    renderIps();
    updateStats();

    document.getElementById('addOperatorBtn').onclick = () => {
      const name = document.getElementById('newOperatorName').value.trim();
      if (!name) return alert('Введите название');
      operators.push({ id: Date.now(), name });
      saveData(); renderOperators(); renderIps();
      document.getElementById('newOperatorName').value = '';
      log(`Оператор "${name}" добавлен`);
    };
    
    document.getElementById('addIpBtn').onclick = () => {
      const ipAddr = document.getElementById('ipInput').value.trim();
      if (!ipAddr) return alert('Введите IP адрес');
      
      const ipData = {
        ip: ipAddr,
        deviceName: document.getElementById('deviceNameInput').value.trim(),
        deviceNumber: document.getElementById('deviceNumberInput').value.trim(),
        description: document.getElementById('ipDescriptionInput').value.trim(),
        operatorId: document.getElementById('operatorSelect').value ? Number(document.getElementById('operatorSelect').value) : '',
        timeout: Number(document.getElementById('timeoutInput').value) || 5000,
        attempts: Number(document.getElementById('pingAttempts').value) || 4,
        selected: false, lastCheck: null, continuousPing: false, continuousTimerId: null
      };
      
      if (editingId) {
        if (ips[editingId].continuousPing) stopContinuous(ips[editingId]);
        ips[editingId] = { ...ips[editingId], ...ipData };
        log(`IP адрес "${ipAddr}" обновлен`);
        editingId = null;
      } else {
        const id = Date.now();
        ips[id] = { ...ipData, id };
        log(`IP адрес "${ipAddr}" добавлен`);
      }
      saveData(); resetForm(); renderIps(); updateStats();
    };
    
    document.getElementById('cancelEditBtn').onclick = resetForm;
    document.getElementById('checkSelectedBtn').onclick = startBatchCheck;
    document.getElementById('stopCheckBtn').onclick = () => { activeCheck = false; log('⏸️ Проверка остановлена'); };
    document.getElementById('resetStatusBtn').onclick = () => {
      for (const ip of Object.values(ips)) ip.lastCheck = null;
      statusFilter = null;
      saveData(); renderIps(); updateStats();
      log('Статусы сброшены');
    };
    document.getElementById('importFileBtn').onclick = () => document.getElementById('fileImportInput').click();
    document.getElementById('exportFileBtn').onclick = exportCsv;
    
    document.getElementById('reportHtmlBtn').onclick = () => generateReport('html');
    document.getElementById('reportTxtBtn').onclick = () => generateReport('txt');
    document.getElementById('reportCsvBtn').onclick = () => generateReport('csv');
    
    document.getElementById('methodBatch').onclick = () => {
      checkMethod = 'batch';
      saveData();
      updateCheckMethodUI();
      log('✅ Способ проверки изменен на: Пакетный (по 8 адресов одновременно)');
    };
    
    document.getElementById('methodSequential').onclick = () => {
      checkMethod = 'sequential';
      saveData();
      updateCheckMethodUI();
      log('✅ Способ проверки изменен на: Последовательный (по одному адресу)');
    };
    
    document.getElementById('backupBtn').onclick = createBackup;
    document.getElementById('restoreBtn').onclick = showBackups;
    document.getElementById('clearLogBtn').onclick = () => { logBuffer = []; document.getElementById('workLog').textContent = ''; };
    
    document.getElementById('selectAllIps').onchange = (e) => {
      const filterIp = document.getElementById('ipFilterInput').value.toLowerCase();
      const filterDevice = document.getElementById('deviceNameFilterInput').value.toLowerCase();
      const filterNumber = document.getElementById('deviceNumberFilterInput').value.toLowerCase();
      const filterDesc = document.getElementById('descFilterInput').value.toLowerCase();
      const filterOp = document.getElementById('operatorFilter').value;
      for (const ip of Object.values(ips)) {
        if (filterOp !== 'ALL' && String(ip.operatorId) !== filterOp) continue;
        if (filterIp && !ip.ip.toLowerCase().includes(filterIp)) continue;
        if (filterDevice && !(ip.deviceName || '').toLowerCase().includes(filterDevice)) continue;
        if (filterNumber && !(ip.deviceNumber || '').toLowerCase().includes(filterNumber)) continue;
        if (filterDesc && !(ip.description || '').toLowerCase().includes(filterDesc)) continue;
        ip.selected = e.target.checked;
      }
      renderIps();
    };
    
    ['ipFilterInput', 'deviceNameFilterInput', 'deviceNumberFilterInput', 'descFilterInput'].forEach(id => {
      document.getElementById(id).addEventListener('input', renderIps);
    });
    document.getElementById('operatorFilter').addEventListener('change', renderIps);
    document.getElementById('fileImportInput').onchange = (e) => { if (e.target.files[0]) importCsv(e.target.files[0]); e.target.value = ''; };
    
    const themeToggle = document.getElementById('themeToggle');
    themeToggle.onclick = () => {
      document.body.classList.toggle('dark');
      themeToggle.textContent = document.body.classList.contains('dark') ? '☀️' : '🌙';
      localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
      updateStats();
    };
    if (localStorage.getItem('theme') === 'dark') { document.body.classList.add('dark'); themeToggle.textContent = '☀️'; }
    
    log('✅ Программа готова. Пакетная проверка: по 8 адресов одновременно. Кликните на статистику для фильтрации IP');
  </script>
